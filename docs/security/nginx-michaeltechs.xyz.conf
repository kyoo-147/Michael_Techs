# michaeltechs.xyz Nginx hardening reference

Use this as the production reference for `/etc/nginx/sites-available/michaeltechs.xyz`.
Adjust only `root`, certificate paths, and included snippets if the VPS uses a different layout.

```nginx
server {
    listen 80;
    listen [::]:80;
    server_name michaeltechs.xyz www.michaeltechs.xyz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name michaeltechs.xyz www.michaeltechs.xyz;

    root /var/www/michaeltechs.xyz/current;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/michaeltechs.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/michaeltechs.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ /\.(?!well-known/) {
        return 404;
    }

    location ~* \.(?:env|ini|log|sql|bak|backup|old|orig|save|swp|zip|tar|gz|tgz|7z|rar)$ {
        return 404;
    }

    location = /404.html {
        internal;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri.html $uri/index.html $uri =404;
    }

    error_page 404 /404.html;

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|avif|ico|svg|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }
}
```

Apply/retest checklist:

```bash
sudo nginx -T > /tmp/nginx-before-michaeltechs.txt
sudo cp /etc/nginx/sites-available/michaeltechs.xyz /etc/nginx/sites-available/michaeltechs.xyz.bak.$(date +%Y%m%d%H%M%S)
sudoedit /etc/nginx/sites-available/michaeltechs.xyz
sudo nginx -t
sudo systemctl reload nginx

curl -I https://michaeltechs.xyz/
curl -I https://michaeltechs.xyz/this-path-should-not-exist-security-audit
curl -I https://michaeltechs.xyz/.env
```

Expected retest:

- `/` returns `HTTP/2 200` or `HTTP/1.1 200` with `Strict-Transport-Security` and `Content-Security-Policy`.
- `/this-path-should-not-exist-security-audit` returns `404`, not `200`.
- `/.env` returns `404`, not a static fallback page with status `200`.
